services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: trailmatch
      POSTGRES_USER: trailmatch
      POSTGRES_PASSWORD: trailmatch
    ports: ["5432:5432"]
  app:
    build: .
    environment:
      DB_URL: jdbc:postgresql://db:5432/trailmatch
      DB_USER: trailmatch
      DB_PASSWORD: trailmatch
      JWT_SECRET: change_this_secret_change_this_secret_123456
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports: ["8080:8080"]
    depends_on: [db]
