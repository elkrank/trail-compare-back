spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trailmatch}
    username: ${DB_USER:trailmatch}
    password: ${DB_PASSWORD:trailmatch}
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    connect-retries: 10
    connect-retries-interval: 5s
app:
  jwt:
    secret: ${JWT_SECRET:change_this_secret_change_this_secret_123456}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
    refresh-ttl-minutes: ${JWT_REFRESH_TTL_MIN:10080}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin1234}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
